  <symbol id="icon-logo-symbol" viewBox="0 0 100 92">
    <circle cx="50" cy="40" r="31" stroke="currentColor" stroke-width="1.6" fill="none"/>
    <text x="44" y="38" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="27" font-weight="600" fill="currentColor">B</text>
    <text x="60" y="48" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="19" font-weight="600" fill="currentColor">C</text>
    <path d="M25 56 L36 43 L44 51 L56 36 L70 56" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="66" cy="38" r="2.4" fill="currentColor"/>
